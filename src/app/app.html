<main class="page">
  <header>
    <p class="eyebrow">Machine Coding Round</p>
    <h1>Google Calendar Day / Week View Logic</h1>
    <p>
      Overlapping events are detected and assigned dynamic columns so they render side-by-side instead of visually colliding.
    </p>
  </header>

  <app-calendar-toolbar
    [visibleCount]="isWeekLayout() ? filteredEvents().length : positionedEvents().length"
    [activeView]="activeView()"
    [dayLabel]="dayRange().label"
    [activeFilter]="activeFilter()"
    [viewModes]="viewModes"
    [counts]="statusCounts()"
    (viewChange)="setView($event)"
    (filterChange)="setFilter($event)"
  />

  <app-event-edit-panel
    [draft]="editDraft()"
    [weekDays]="weekDays"
    (patch)="onEditPatch($event)"
    (save)="saveEdit()"
    (cancel)="cancelEdit()"
  />

  @if (!isWeekLayout()) {
    <app-day-view
      [dayHeightPx]="dayHeightPx()"
      [hourSlotPx]="hourSlotPx()"
      [hours]="hours()"
      [events]="positionedEvents()"
      (edit)="startEdit($event)"
    />
  } @else {
    <app-week-view
      [dayHeightPx]="dayHeightPx()"
      [weekEvents]="weekPositionedEvents()"
      [workingWeek]="activeView() === 'WorkingWeeks'"
      (edit)="startEdit($event)"
    />
  }
</main>
